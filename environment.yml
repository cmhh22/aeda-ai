name: aeda-framework
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Scientific core
  - numpy>=1.26.0
  - pandas>=2.2.0
  - scipy>=1.13.0

  # Machine Learning
  - scikit-learn>=1.5.0
  - joblib>=1.4.0

  # Visualization
  - matplotlib>=3.9.0
  - seaborn>=0.13.0
  - plotly>=5.22.0

  # Jupyter
  - jupyter>=1.0.0
  - jupyterlab>=4.2.0
  - ipywidgets>=8.1.0
  - nbformat>=5.10.0

  # Utilities
  - tqdm>=4.66.0
  - openpyxl>=3.1.0
  - pyarrow>=16.0.0

  # Pip installation (packages not available in conda-forge or pinned versions)
  - pip:
    - pyod>=2.0.0
    - missingno>=0.5.2
    - miceforest>=5.0.2
    - umap-learn>=0.5.6
    - shap>=0.45.0
    - lime>=0.2.0.1
    - kaleido>=0.2.1
    - python-dotenv>=1.0.0
    - colorama>=0.4.6
    - rich>=13.7.0
    - pytest>=8.2.0
    - pytest-cov>=5.0.0
